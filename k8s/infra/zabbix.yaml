apiVersion: v1
kind: Secret
metadata:
  name: zabbix-db-secret
  namespace: monitoring
type: Opaque
stringData:
  POSTGRES_USER: "zabbix"
  POSTGRES_PASSWORD: "EsperancaZabbix@123"
  POSTGRES_DB: "zabbix"

---

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: zabbix-db-pvc
  namespace: monitoring
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: zabbix-db
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zabbix-db
  template:
    metadata:
      labels:
        app: zabbix-db
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: zabbix-db-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: zabbix-db-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: zabbix-db-secret
                  key: POSTGRES_DB
          volumeMounts:
            - name: db-storage
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: db-storage
          persistentVolumeClaim:
            claimName: zabbix-db-pvc

---

apiVersion: v1
kind: Service
metadata:
  name: zabbix-db-service
  namespace: monitoring
spec:
  ports:
    - port: 5432
  selector:
    app: zabbix-db

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: zabbix-server
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zabbix-server
  template:
    metadata:
      labels:
        app: zabbix-server
    spec:
      containers:
        - name: zabbix-server
          image: zabbix/zabbix-server-pgsql:alpine-latest
          ports:
            - containerPort: 10051
          env:
            - name: DB_SERVER_HOST
              value: "zabbix-db-service"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: zabbix-db-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: zabbix-db-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: zabbix-db-secret
                  key: POSTGRES_DB

---

apiVersion: v1
kind: Service
metadata:
  name: zabbix-server-service
  namespace: monitoring
spec:
  ports:
    - port: 10051
  selector:
    app: zabbix-server

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: zabbix-web
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zabbix-web
  template:
    metadata:
      labels:
        app: zabbix-web
    spec:
      containers:
        - name: zabbix-web
          image: zabbix/zabbix-web-nginx-pgsql:alpine-latest
          ports:
            - containerPort: 8080
          env:
            - name: DB_SERVER_HOST
              value: "zabbix-db-service"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: zabbix-db-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: zabbix-db-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: zabbix-db-secret
                  key: POSTGRES_DB
            - name: ZBX_SERVER_HOST
              value: "zabbix-server-service"
            - name: PHP_TZ
              value: "America/Sao_Paulo"
            - name: ZBX_SERVER_ADMIN_PASSWORD
              value: "esperancazabbix123"

---

apiVersion: v1
kind: Service
metadata:
  name: zabbix-zabbix-web
  namespace: monitoring
spec:
  ports:
    - port: 80
      targetPort: 8080
  selector:
    app: zabbix-web