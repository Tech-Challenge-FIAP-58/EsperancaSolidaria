apiVersion: v1
kind: Deployment
metadata:
  name: donation-deployment
  namespace: services
spec:
  replicas: 1
  selector:
    matchLabels:
      app: donation-service
  template:
    metadata:
      labels:
        app: donation-api
    spec:

      initContainers:
        - name: wait-for-rabbitmq
          image: busybox
          command:
            - sh
            - -c
            - |
              echo "Aguardando RabbitMQ..."
              until nc -z rabbitmq 5672; do
                echo "RabbitMQ ainda não disponível..."
                sleep 5
              done
              echo "RabbitMQ disponível!"

      containers:
        - name: donation-api
          image: ghcr.io/tech-challenge-fiap-58/donation-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080

          envFrom:
            - configMapRef:
                name: donation-api-config
            - configMapRef:
                name: services-config

          env:
            - name: ConnectionStrings__Core
              valueFrom:
                secretKeyRef:
                  name: services-secrets
                  key: connectionString

            - name: Jwt__Key
              valueFrom:
                secretKeyRef:
                  name: services-secrets
                  key: jwtKey

            - name: Jwt__Expiration
              valueFrom:
                secretKeyRef:
                  name: services-secrets
                  key: expiration

            - name: RabbitMQ__UserName
              valueFrom:
                secretKeyRef:
                  name: services-secrets
                  key: rabbitMQDefaultUser

            - name: RabbitMQ__Password
              valueFrom:
                secretKeyRef:
                  name: services-secrets
                  key: rabbitMQDefaultPass

            - name: RabbitMQ__VirtualHost
              valueFrom:
                secretKeyRef:
                  name: services-secrets
                  key: rabbitMQDefaultVHost

            - name: RabbitMQ__Host
              valueFrom:
                secretKeyRef:
                  name: services-secrets
                  key: rabbitMQDefaultHost

          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 20
            failureThreshold: 3

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
