name: CampaignService CI

on:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'src/CampaignService/**'

  push:
    branches:
      - develop
    paths:
      - 'src/CampaignService/**'

jobs:
  build-and-test:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: src/CampaignService

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore CampaignService.sln

      - name: Build
        run: |
          dotnet build \
          CampaignService.sln \
          --configuration Release \
          --no-restore

      - name: Run Tests
        run: |
          dotnet test \
          CampaignService.sln \
          --configuration Release \
          --no-build \
          --collect:"XPlat Code Coverage"

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        with:
          name: user-service-test-results
          path: |
            CampaignService/tests/**/TestResults

      - name: Docker Build Validation
        run: |
          docker build \
          -t user-service:ci \
          -f CampaignService.WebApi/Dockerfile \
          .

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: user-service-build
          path: |
            CampaignService/src/**/bin/Release